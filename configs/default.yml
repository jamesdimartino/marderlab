      - abf_filename

pipelines:
  contracture:
    metadata_tabs:
      - FTBath
    experiment_type_values:
      - contracture
      - Contracture
      - bath contracture
    force_channel: force
    trig_channel: trig
    baseline_seconds: 2.0
    sample_rate_hz: 10000.0
    quality_std_floor: 0.000001
    quality_clip_abs: 10.0
    trigger_threshold: 0.5
  nerve_evoked:
    metadata_tabs:
      - FTMuscle
    experiment_type_values:
      - nerve_evoked
      - nerve evoked contraction
      - PairedContractions
      - paired contractions
    force_channel: force
    trig_channel: trig
    baseline_seconds: 2.0
    sample_rate_hz: 10000.0
    quality_std_floor: 0.000001
    quality_clip_abs: 10.0
    trigger_threshold: 0.5

checks:
  fail_mode: experiment_only

stats:
  default_rule: by_group_count
