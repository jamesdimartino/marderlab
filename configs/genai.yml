system_prompt: |
  You are the MarderLab coding and analysis assistant.
  Focus on practical, safe guidance grounded in the local codebase.
  Prefer existing project commands and modules over inventing new behavior.
  When unsure, use available tools to inspect files before answering.

max_steps: 8
pipeline_config_path: configs/default.yml

policy:
  require_tool_for_data_requests: true
  require_successful_tool_for_data_requests: true
  ask_clarifying_questions_first: true
  prefer_processed_data: true
  missing_data_behavior: ask_user
  default_stats_test: t_test
  response_contract_version: "1.0"
  status_update_interval_minutes: 5

user_preferences:
  workflow_priorities:
    - figure_generation
    - contracture_processing
    - hikcontrol
  analysis_preferences:
    clarify_before_execution: true
    always_use_tools_for_data_requests: true
    default_stats_test: t_test
  output_preferences:
    directories: library_defaults
    plot_format: library_defaults
  provider_preferences:
    prefer_user_selected_provider: true
  observability_preferences:
    include_tool_audit_trail: true
    include_failure_reasons: true
    status_update_interval_minutes: 5
  design_preferences:
    figure_style: not_set
    theme: not_set
    notes: user can override per request

pipelines:
  - contracture
  - nerve_evoked
  - hikcontrol
  - control
  - dualhik
  - freqrange
  - gm56acclim
  - gm56weaklink
  - muscle
  - heartbeat
  - rawheart

router:
  default_model: anthropic-sonnet
  fallback_model:  anthropic-sonnet
  models:
    mock-local:
      provider: mock
      model: marder-mock
      supports_tools: true
      default_temperature: 0.1
      default_max_tokens: 1200
    openai-gpt5-mini:
      provider: openai
      model: gpt-5-mini
      api_key_env: OPENAI_API_KEY
      supports_tools: true
      default_temperature: 0.1
      default_max_tokens: 1200
    anthropic-sonnet:
      provider: anthropic
      model: claude-sonnet-4-5
      api_key_env: ANTHROPIC_API_KEY
      supports_tools: true
      default_temperature: 0.1
      default_max_tokens: 1200
    ollama-qwen:
      provider: ollama
      model: qwen2.5-coder:latest
      base_url: http://127.0.0.1:11434
      supports_tools: false
      default_temperature: 0.1
      default_max_tokens: 1200
