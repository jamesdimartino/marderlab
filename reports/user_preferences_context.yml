workflow_priorities:
- figure_generation
- contracture_processing
- hikcontrol
output_preferences:
  directories: library_defaults
  plot_format: library_defaults
  overwrite_notebooks: never
analysis_preferences:
  default_stats_test: t_test
  clarify_before_execution: true
  always_use_tools_for_data_requests: true
  parse_prompt_for_experiment_and_metadata: true
  ask_notebook_confirmation_before_processing: true
  use_processed_data_when_available: true
  process_if_missing_then_show_sanity_checks: true
  require_user_validation_before_final_plots: true
  missing_data_behavior: ask_user
  require_stats_for_comparison_plots: true
design_preferences:
  figure_style: not_set
  theme: not_set
  color_theme: not_set
  typography: not_set
  notes: user can override per request
profile:
  owner: james
  created_at: '2026-03-01'
  source: codex_architecture_hardening
provider_preferences:
  prefer_user_selected_provider: true
  fallback_behavior: auto_retry_with_policy_enforcement
observability_preferences:
  include_tool_audit_trail: true
  include_failure_reasons: true
  status_update_interval_minutes: 5
